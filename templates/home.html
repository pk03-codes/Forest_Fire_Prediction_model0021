<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        .result {
            font-size: 28px;
            font-weight: bold;
            color: #ff5e62;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #ff5e62;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }

        a:hover {
            background: #e04e4e;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔥 Prediction Result</h1>

    <div class="result">
        {{ results }}
    </div>

    <a href="/">🔙 Try Again</a>
</div>

</body>
</html>
